<div class="page-title">Active Sessions</div>
<div class="page-subtitle">Manage currently connected clients.</div>

<div class="card">
  <div class="card-header">
    <div>
      <div class="card-title">Connected Clients</div>
      <div class="card-subtitle" id="sessionSummary">Loading...</div>
    </div>
    <button class="btn btn-primary" onclick="loadSessions()">
      <i class="fas fa-sync-alt"></i> Refresh
    </button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Voucher ID</th>
          <th>MAC Address</th>
          <th>Time Remaining</th>
          <th>Hard Expiry</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="sessionsTable">
        <tr>
          <td colspan="6">
            <div class="loading">
              <i class="fas fa-spinner fa-spin"></i> Loading sessions...
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ADD TIME MODAL -->
<!-- Bug: this modal's markup was truncated mid-tag in the committed file —
     the actual minutes input, quick-set buttons, and confirm button never
     existed at all. Clicking "Add Time" called openAddTime(), which tried
     to set .value on a null #addTimeMinutes element and threw immediately —
     this whole feature was completely non-functional. -->
<div class="modal-overlay" id="addTimeModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <i class="fas fa-clock" style="color:var(--accent-green);margin-right:8px;"></i>
        Add / Reduce Time
      </div>
      <button class="modal-close" onclick="closeModal('addTimeModal')">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
      Adjusting time for: <strong id="addTimeVoucher" style="color:var(--accent-red);font-family:monospace;"></strong>
    </p>
    <div class="form-group">
      <label class="form-label">Minutes</label>
      <input type="number" id="addTimeMinutes" class="form-control" placeholder="e.g. 30 to add, -15 to reduce">
      <small style="color:var(--text-muted);">Use a negative number to reduce a client's remaining time.</small>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
      <button class="btn btn-sm btn-secondary" onclick="setMinutes(10)">+10 min</button>
      <button class="btn btn-sm btn-secondary" onclick="setMinutes(30)">+30 min</button>
      <button class="btn btn-sm btn-secondary" onclick="setMinutes(60)">+60 min</button>
      <button class="btn btn-sm btn-secondary" onclick="setMinutes(-10)">-10 min</button>
      <button class="btn btn-sm btn-secondary" onclick="setMinutes(-30)">-30 min</button>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('addTimeModal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddTime()">
        <i class="fas fa-save"></i> Apply
      </button>
    </div>
  </div>
</div>
