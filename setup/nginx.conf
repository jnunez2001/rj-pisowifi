# R&J PisoWifi — TLS front door for WAN-side admin access only.
#
# LAN captive-portal traffic never reaches nginx: setup-network.sh's
# nftables rules DNAT it straight to 127.0.0.1:3000 before nginx (or any
# other listening process) ever sees it, and it must stay plain HTTP —
# phones' built-in captive-portal auto-detection breaks against a
# self-signed TLS certificate. This config only matters for the WAN
# interface, where the admin panel used to be reachable over plain HTTP
# with a default password (setup-network.sh's old port 80 -> 3000 redirect).
#
# Certs are self-signed, generated by install.sh into /etc/rj-pisowifi/tls/
# — there's no public domain for this box to get a real cert for. Self-
# signed is still strictly better than plaintext: it stops passive network
# sniffing of the admin password in transit, even though the browser will
# show a certificate warning on first visit (expected and fine for a
# single-admin, IP-address-only deployment).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/rj-pisowifi/tls/fullchain.pem;
    ssl_certificate_key /etc/rj-pisowifi/tls/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
